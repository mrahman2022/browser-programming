<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Notes App</h1>

    <section class="card">
      <h2>Add Note</h2>
      <form id="noteForm">
        <input id="titleInput" type="text" placeholder="Note title" required />
        <textarea id="contentInput" placeholder="Write your note..." rows="5" required></textarea>
        <button type="submit">Add Note</button>
      </form>
    </section>

    <section class="card">
      <h2>All Notes</h2>
      <p id="statusText">Loading notes...</p>
      <div id="notesList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
